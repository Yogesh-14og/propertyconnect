{% extends 'main/base.html' %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="netflix-form-card" style="max-width: 420px; width: 100%;">
        <div class="text-center mb-4">
            <i class="fas fa-sign-in-alt fa-3x" style="color: #E50914;"></i>
            <h3 class="fw-bold text-white mt-2">Welcome Back</h3>
            <p class="text-muted small">Sign in to continue</p>
        </div>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label"><i class="fas fa-user"></i>Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
            </div>
            <div class="mb-3">
                <label class="form-label"><i class="fas fa-lock"></i>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-netflix w-100">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>
        <div class="mt-3 text-center">
            <p class="text-muted small mb-0">
                New to PropertyConnect? <a href="{% url 'signup' %}" class="text-danger fw-bold">Sign Up</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
